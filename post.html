<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>文章 — 简</title>
  <link rel="icon" type="image/jpeg" href="assets/logo.jpg">
  <link rel="stylesheet" href="css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@200;300;400;600;700&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
</head>
<body>

  <!-- 导航栏 -->
  <nav class="nav scrolled" id="nav">
    <div class="nav-inner">
      <a href="index.html" class="nav-logo"><img src="assets/logo.jpg" alt="简" class="nav-logo-img"></a>
      <div class="nav-links">
        <a href="index.html" class="nav-link" data-page="home">首页</a>
        <a href="post.html" class="nav-link active" data-page="post">文章</a>
        <a href="write.html" class="nav-link" data-page="write">写文章</a>
        <a href="config.html" class="nav-link" data-page="config">配置</a>
        <a href="index.html#about" class="nav-link" data-page="about">关于</a>
      </div>
      <button class="nav-menu-btn" id="menuBtn" aria-label="菜单">
        <span></span>
        <span></span>
      </button>
    </div>
  </nav>

  <!-- 移动端菜单 -->
  <div class="mobile-menu" id="mobileMenu">
    <a href="index.html" class="mobile-link" data-page="home">首页</a>
    <a href="post.html" class="mobile-link active" data-page="post">文章</a>
    <a href="write.html" class="mobile-link" data-page="write">写文章</a>
    <a href="config.html" class="mobile-link" data-page="config">配置</a>
    <a href="index.html#about" class="mobile-link" data-page="about">关于</a>
  </div>

  <!-- 主内容 -->
  <main class="main">

    <!-- 文章详情视图（有 id 参数时显示） -->
    <article class="post-page" id="postDetail" style="display:none;">

      <!-- Token 未配置提示 -->
      <div class="token-notice" id="tokenNotice" style="display:none;">
        <p>尚未配置 GitHub Token，无法加载文章数据。</p>
        <a href="config.html">前往配置</a>
      </div>

      <!-- API 错误提示 -->
      <div class="posts-error" id="postsError" style="display:none;">
        <p id="errorMessage">加载文章失败，请检查网络连接或 Token 配置。</p>
        <a href="config.html">检查配置</a>
      </div>

      <!-- 封面图 -->
      <div class="post-cover" id="postCover" style="display:none;">
        <img id="postCoverImg" src="" alt="封面">
      </div>

      <!-- 文章头部 -->
      <header class="post-page-header">
        <div class="post-page-meta" id="postMeta"></div>
        <h1 class="post-page-title" id="postTitle"></h1>
        <p class="post-page-subtitle" id="postSubtitle"></p>
      </header>

      <!-- 文章正文 -->
      <div class="post-body" id="postBody"></div>

      <!-- 附件下载区 -->
      <div class="post-attachments" id="postAttachments" style="display:none;">
        <h3 class="post-attachments-title">附件</h3>
        <ul class="post-attachments-list" id="postAttachmentsList"></ul>
      </div>

      <!-- 操作按钮 -->
      <div class="post-actions" id="postActions">
        <a href="write.html" class="btn-outline" id="btnNewPost">写新文章</a>
        <a href="#" class="btn-outline" id="btnEditPost" style="display:none;">编辑</a>
        <a href="#" class="btn-outline btn-delete" id="btnDeletePost" style="display:none;">删除</a>
      </div>

      <!-- 文章底部导航 -->
      <nav class="post-nav" id="postNav">
        <a href="#" id="prevPost">← 上一篇</a>
        <a href="post.html">返回列表</a>
        <a href="#" id="nextPost">下一篇 →</a>
      </nav>

    </article>

    <!-- 文章列表视图（无 id 参数时显示） -->
    <div class="posts-list-page" id="postsListPage">
      <section class="posts-section">
        <div class="section-header">
          <h2 class="section-title">所有文章</h2>
          <div class="section-line"></div>
        </div>
        <!-- Token 未配置提示 -->
        <div class="token-notice" id="listTokenNotice" style="display:none;">
          <p>尚未配置 GitHub Token，无法加载文章数据。</p>
          <a href="config.html">前往配置</a>
        </div>
        <!-- API 错误提示 -->
        <div class="posts-error" id="listPostsError" style="display:none;">
          <p id="listErrorMessage">加载文章失败，请检查网络连接或 Token 配置。</p>
          <a href="config.html">检查配置</a>
        </div>
        <div class="posts-grid" id="allPostsGrid">
          <!-- 由 JS 动态渲染 -->
        </div>
        <div class="posts-empty" id="allPostsEmpty" style="display:none;">
          <p>还没有文章，<a href="write.html">开始写第一篇</a></p>
        </div>
      </section>
    </div>

  </main>

  <!-- 页脚 -->
  <footer class="footer">
    <div class="footer-inner">
      <div class="footer-logo"><img src="assets/logo.jpg" alt="简" class="footer-logo-img"></div>
      <p class="footer-copy">© 2026 简 · 活得简单，思想简单，情绪简单</p>
    </div>
  </footer>

  <script src="js/main.js"></script>
  <script src="js/github-storage.js"></script>
  <script>
    /**
     * 文章详情页逻辑
     * 根据 URL 参数 ?id=xxx 动态加载文章，或展示文章列表
     * 使用 GitHub Issues API 作为数据源
     * @author 钱卫忠
     */
    (function () {
      'use strict';

      /* ---------- DOM 元素 ---------- */
      var postDetail = document.getElementById('postDetail');
      var postsListPage = document.getElementById('postsListPage');
      var tokenNotice = document.getElementById('tokenNotice');
      var postsError = document.getElementById('postsError');
      var errorMessage = document.getElementById('errorMessage');
      var listTokenNotice = document.getElementById('listTokenNotice');
      var listPostsError = document.getElementById('listPostsError');
      var listErrorMessage = document.getElementById('listErrorMessage');
      var postCover = document.getElementById('postCover');
      var postCoverImg = document.getElementById('postCoverImg');
      var postMeta = document.getElementById('postMeta');
      var postTitle = document.getElementById('postTitle');
      var postSubtitle = document.getElementById('postSubtitle');
      var postBody = document.getElementById('postBody');
      var postAttachments = document.getElementById('postAttachments');
      var postAttachmentsList = document.getElementById('postAttachmentsList');
      var btnEditPost = document.getElementById('btnEditPost');
      var btnDeletePost = document.getElementById('btnDeletePost');
      var prevPostLink = document.getElementById('prevPost');
      var nextPostLink = document.getElementById('nextPost');
      var allPostsGrid = document.getElementById('allPostsGrid');
      var allPostsEmpty = document.getElementById('allPostsEmpty');

      // 当前文章列表（用于上下篇导航）
      var currentPostsList = [];

      /**
       * 获取 URL 查询参数
       * @param {string} name - 参数名
       * @returns {string|null} 参数值
       */
      function getUrlParam(name) {
        var params = new URLSearchParams(window.location.search);
        return params.get(name);
      }

      /**
       * HTML 转义，防止 XSS
       * @param {string} str - 原始字符串
       * @returns {string} 转义后的字符串
       */
      function escapeHtml(str) {
        var div = document.createElement('div');
        div.appendChild(document.createTextNode(str));
        return div.innerHTML;
      }

      /**
       * 检查 Token 配置状态
       * @returns {boolean} 是否已配置
       */
      function checkToken() {
        if (!GitHubStorage.isConfigured()) {
          return false;
        }
        return true;
      }

      /**
       * 显示详情页错误
       * @param {string} message - 错误消息
       */
      function showDetailError(message) {
        errorMessage.textContent = message || '加载文章失败，请检查网络连接或 Token 配置。';
        postsError.style.display = 'block';
        tokenNotice.style.display = 'none';
        // 隐藏文章内容元素
        postCover.style.display = 'none';
        document.querySelector('.post-page-header').style.display = 'none';
        postBody.style.display = 'none';
        document.getElementById('postActions').style.display = 'none';
        document.getElementById('postNav').style.display = 'none';
      }

      /**
       * 显示列表页错误
       * @param {string} message - 错误消息
       */
      function showListError(message) {
        listErrorMessage.textContent = message || '加载文章失败，请检查网络连接或 Token 配置。';
        listPostsError.style.display = 'block';
        listTokenNotice.style.display = 'none';
        allPostsGrid.style.display = 'none';
        allPostsEmpty.style.display = 'none';
      }

      /**
       * 将 Markdown 内容转换为 HTML（简单实现）
       * @param {string} markdown - Markdown 文本
       * @returns {string} HTML
       */
      function markdownToHtml(markdown) {
        if (!markdown) return '<p>暂无内容</p>';

        var html = markdown;

        // 处理标题
        html = html.replace(/^### (.*$)/gim, '<h3>$1</h3>');
        html = html.replace(/^## (.*$)/gim, '<h2>$1</h2>');
        html = html.replace(/^# (.*$)/gim, '<h1>$1</h1>');

        // 处理粗体和斜体
        html = html.replace(/\*\*\*(.*?)\*\*\*/g, '<strong><em>$1</em></strong>');
        html = html.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
        html = html.replace(/\*(.*?)\*/g, '<em>$1</em>');

        // 处理引用
        html = html.replace(/^> (.*$)/gim, '<blockquote>$1</blockquote>');

        // 处理代码块
        html = html.replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>');
        html = html.replace(/`([^`]+)`/g, '<code>$1</code>');

        // 处理链接
        html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>');

        // 处理图片
        html = html.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img src="$2" alt="$1" style="max-width:100%;">');

        // 处理无序列表
        html = html.replace(/^\- (.*$)/gim, '<li>$1</li>');
        html = html.replace(/(<li>.*<\/li>\n?)+/g, '<ul>$&</ul>');
        html = html.replace(/<\/ul>\s*<ul>/g, '');

        // 处理有序列表
        html = html.replace(/^\d+\. (.*$)/gim, '<li>$1</li>');

        // 处理水平线
        html = html.replace(/^---$/gim, '<hr>');

        // 处理段落
        html = html.replace(/\n\n/g, '</p><p>');
        html = '<p>' + html + '</p>';

        // 清理多余的段落标签
        html = html.replace(/<p><\/p>/g, '');
        html = html.replace(/<p>(<h[1-6]>.*?<\/h[1-6]>)<\/p>/g, '$1');
        html = html.replace(/<p>(<blockquote>.*?<\/blockquote>)<\/p>/g, '$1');
        html = html.replace(/<p>(<pre>.*?<\/pre>)<\/p>/g, '$1');
        html = html.replace(/<p>(<ul>.*?<\/ul>)<\/p>/g, '$1');
        html = html.replace(/<p><hr><\/p>/g, '<hr>');

        return html;
      }

      /**
       * 显示文章详情
       * @param {string} id - 文章 ID（Issue 编号）
       */
      function showPostDetail(id) {
        // 检查 Token
        if (!checkToken()) {
          postDetail.style.display = 'block';
          postsListPage.style.display = 'none';
          tokenNotice.style.display = 'block';
          postsError.style.display = 'none';
          // 隐藏文章内容元素
          postCover.style.display = 'none';
          document.querySelector('.post-page-header').style.display = 'none';
          postBody.style.display = 'none';
          document.getElementById('postActions').style.display = 'none';
          document.getElementById('postNav').style.display = 'none';
          return;
        }

        // 获取文章详情
        GitHubStorage.getPostById(parseInt(id))
          .then(function (issue) {
            var post = GitHubStorage.issueToPost(issue);

            // 切换视图
            postDetail.style.display = 'block';
            postsListPage.style.display = 'none';
            tokenNotice.style.display = 'none';
            postsError.style.display = 'none';

            // 恢复显示文章内容元素
            document.querySelector('.post-page-header').style.display = 'block';
            postBody.style.display = 'block';
            document.getElementById('postActions').style.display = 'flex';
            document.getElementById('postNav').style.display = 'flex';

            // 设置页面标题
            document.title = (post.title || '文章') + ' — 简';

            // 封面图（从正文中提取图片）
            var imgMatch = post.content.match(/!\[.*?\]\((.*?)\)/);
            if (imgMatch) {
              postCoverImg.src = imgMatch[1];
              postCover.style.display = 'block';
            } else {
              postCover.style.display = 'none';
            }

            // 元信息
            postMeta.innerHTML =
              '<span>' + (post.date || '') + '</span>' +
              '<span>&nbsp;·&nbsp;</span>' +
              '<span>' + escapeHtml(post.category || '其他') + '</span>' +
              '<span>&nbsp;·&nbsp;</span>' +
              '<span>阅读约 ' + (post.readTime || 1) + ' 分钟</span>';

            // 标题和副标题
            postTitle.textContent = post.title || '无标题';
            postSubtitle.textContent = post.subtitle || '';
            postSubtitle.style.display = post.subtitle ? 'block' : 'none';

            // 正文内容（Markdown 转 HTML）
            postBody.innerHTML = markdownToHtml(post.content);

            // 附件列表（GitHub Issues 不直接支持附件，此处保留接口）
            postAttachments.style.display = 'none';

            // 编辑和删除按钮
            btnEditPost.style.display = 'inline-block';
            btnEditPost.href = 'write.html?edit=' + post.id;
            btnDeletePost.style.display = 'inline-block';

            // 上下篇导航
            setupPostNav(post.id);

            // 滚动到顶部
            window.scrollTo(0, 0);
          })
          .catch(function (error) {
            console.error('加载文章详情失败:', error);
            postDetail.style.display = 'block';
            postsListPage.style.display = 'none';
            showDetailError('加载文章失败：' + error.message);
          });
      }

      /**
       * 设置上一篇/下一篇导航
       * @param {number} currentId - 当前文章 ID
       */
      function setupPostNav(currentId) {
        // 过滤已发布文章
        var posts = currentPostsList.filter(function (p) {
          return p.status === 'published';
        });

        var currentIndex = -1;
        for (var i = 0; i < posts.length; i++) {
          if (posts[i].id === currentId) {
            currentIndex = i;
            break;
          }
        }

        // 上一篇
        if (currentIndex > 0 && currentIndex < posts.length) {
          prevPostLink.href = 'post.html?id=' + posts[currentIndex - 1].id;
          prevPostLink.style.visibility = 'visible';
        } else {
          prevPostLink.style.visibility = 'hidden';
        }

        // 下一篇
        if (currentIndex >= 0 && currentIndex < posts.length - 1) {
          nextPostLink.href = 'post.html?id=' + posts[currentIndex + 1].id;
          nextPostLink.style.visibility = 'visible';
        } else {
          nextPostLink.style.visibility = 'hidden';
        }
      }

      /**
       * 显示文章列表
       */
      function showPostsList() {
        // 检查 Token
        if (!checkToken()) {
          postsListPage.style.display = 'block';
          postDetail.style.display = 'none';
          listTokenNotice.style.display = 'block';
          listPostsError.style.display = 'none';
          allPostsGrid.style.display = 'none';
          allPostsEmpty.style.display = 'none';
          return;
        }

        postsListPage.style.display = 'block';
        postDetail.style.display = 'none';
        listTokenNotice.style.display = 'none';
        listPostsError.style.display = 'none';
        allPostsGrid.style.display = 'grid';

        // 从 GitHub Issues 获取文章
        GitHubStorage.getPosts({ state: 'open' })
          .then(function (issues) {
            // 转换并保存文章列表
            currentPostsList = issues.map(function (issue) {
              return GitHubStorage.issueToPost(issue);
            });

            // 过滤已发布文章用于显示
            var posts = currentPostsList.filter(function (p) {
              return p.status === 'published';
            });

            allPostsGrid.innerHTML = '';

            if (posts.length === 0) {
              allPostsEmpty.style.display = 'block';
              allPostsGrid.style.display = 'none';
              return;
            }

            allPostsEmpty.style.display = 'none';
            allPostsGrid.style.display = 'grid';

            posts.forEach(function (post) {
              var card = document.createElement('article');
              card.className = 'post-card';
              card.setAttribute('data-category', post.category || '其他');

              // 提取摘要
              var excerpt = post.subtitle || post.excerpt;

              card.innerHTML =
                '<div class="post-card-inner">' +
                  '<time class="post-date">' + (post.date || '') + '</time>' +
                  '<h3 class="post-title">' +
                    '<a href="post.html?id=' + post.id + '">' + escapeHtml(post.title || '无标题') + '</a>' +
                  '</h3>' +
                  '<p class="post-excerpt">' + escapeHtml(excerpt) + '</p>' +
                  '<div class="post-meta">' +
                    '<span class="post-tag">' + escapeHtml(post.category || '其他') + '</span>' +
                    '<span class="post-read">· 阅读约 ' + (post.readTime || 1) + ' 分钟</span>' +
                  '</div>' +
                '</div>';

              allPostsGrid.appendChild(card);
            });

            // 初始化滚动动画
            initScrollAnimations();
          })
          .catch(function (error) {
            console.error('加载文章列表失败:', error);
            showListError('加载文章失败：' + error.message);
          });
      }

      /**
       * 初始化滚动动画
       */
      function initScrollAnimations() {
        var cards = document.querySelectorAll('.post-card');
        if (!('IntersectionObserver' in window)) {
          cards.forEach(function (card) { card.classList.add('visible'); });
          return;
        }
        var observer = new IntersectionObserver(function (entries) {
          entries.forEach(function (entry) {
            if (entry.isIntersecting) {
              var index = Array.prototype.indexOf.call(cards, entry.target);
              entry.target.style.transitionDelay = (index * 0.1) + 's';
              entry.target.classList.add('visible');
              observer.unobserve(entry.target);
            }
          });
        }, { threshold: 0.1, rootMargin: '0px 0px -50px 0px' });
        cards.forEach(function (card) { observer.observe(card); });
      }

      /* ---------- 删除文章 ---------- */
      /**
       * 删除文章确认与执行
       */
      btnDeletePost.addEventListener('click', function (e) {
        e.preventDefault();
        var id = getUrlParam('id');
        if (!id) return;

        if (!GitHubStorage.isConfigured()) {
          alert('请先配置 GitHub Token');
          return;
        }

        if (confirm('确定要删除这篇文章吗？删除后不可恢复。')) {
          GitHubStorage.deletePost(parseInt(id))
            .then(function () {
              // 跳转回文章列表
              window.location.href = 'post.html';
            })
            .catch(function (error) {
              console.error('删除文章失败:', error);
              alert('删除失败：' + error.message);
            });
        }
      });

      /* ---------- 页面初始化 ---------- */
      var postId = getUrlParam('id');
      if (postId) {
        showPostDetail(postId);
      } else {
        showPostsList();
      }

    })();
  </script>
</body>
</html>
